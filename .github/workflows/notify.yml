name: Notify Slack

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *quant-trading-system* \`${{ github.ref_name }}\` — pushed\",\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"✅ *quant-trading-system* \`${{ github.ref_name }}\` — pushed\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|View commit>\"}}]}"
